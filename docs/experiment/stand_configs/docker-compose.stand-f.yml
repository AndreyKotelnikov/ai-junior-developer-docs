# Тестовый стенд F: Multi-agent + 3-shot RAG + Ollama (H4 exp)
#
# Запуск:  docker compose -f docker-compose.stand-f.yml up -d --build
# Стоп:   docker compose -f docker-compose.stand-f.yml down
#
# Предусловие: docker compose -f docker-compose.shared.yml уже запущен
#
# OLLAMA: После запуска стенда переключить LLM-режим на Ollama:
#   curl -X PUT http://localhost:8050/api/llm/config \
#     -H "Content-Type: application/json" \
#     -d '{"llm_mode": "ollama"}'
#
# Параметры тестирования передаются в теле API-запроса:
#   POST http://localhost:8050/api/tasks
#   {"requirement": "...", "agent_mode": "...", "use_rag": ..., "rag_top_k": ..., "use_graph": ...}

services:
  multiagent-f:
    build:
      context: ./multiagent
      dockerfile: Dockerfile
    container_name: hyp-f-multiagent
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://openrouter.ai/api/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-anthropic/claude-haiku-4.5}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-qwen2.5-coder:14b}
      RAG_DEVICE: cpu
      ORCHESTRATOR_MODEL: ${ORCHESTRATOR_MODEL:-}
      CODER_MODEL: ${CODER_MODEL:-}
      EXPLORER_MODEL: ${EXPLORER_MODEL:-}
      FIX_MODEL: ${FIX_MODEL:-}
      ORCHESTRATOR_API_BASE: ${ORCHESTRATOR_API_BASE:-}
      ORCHESTRATOR_API_KEY: ${ORCHESTRATOR_API_KEY:-}
      CODER_API_BASE: ${CODER_API_BASE:-}
      CODER_API_KEY: ${CODER_API_KEY:-}
      EXPLORER_API_BASE: ${EXPLORER_API_BASE:-}
      EXPLORER_API_KEY: ${EXPLORER_API_KEY:-}
      FIX_API_BASE: ${FIX_API_BASE:-}
      FIX_API_KEY: ${FIX_API_KEY:-}
      DATABASE_URL: postgresql://postgres:postgres@hyp-postgres:5432/contextstore_f
      DOTNET_APP_URL: http://hyp-f-dotnet-app:5000
      DOTNET_CODE_PATH: /app/code
      ENABLE_METRICS: "true"
      METRICS_PORT: 8000
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      ENABLE_CONTENT_LOGGING: "true"
      USE_DOCKER_EXEC: "true"
      DOTNET_CONTAINER_NAME: "hyp-f-dotnet-app"
      DOTNET_LOGS_PATH: /app/dotnet-logs
      RAG_SERVICE_URL: http://hyp-rag-service:8100
      RAG_SERVICE_TIMEOUT: "30"
      RAG_SERVICE_ENABLED: "true"
      RAG_SERVICE_TOP_K: "5"
      ROSLYN_ANALYZER_ENABLED: "true"
      ENABLE_INSTANT_LINT: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 90s
      timeout: 45s
      retries: 10
      start_period: 90s
    volumes:
      - ./test-stands/src-F:/app/code:rw
      - ./volumes/hypothesis-logs/stand-F/workspace:/app/workspace:rw
      - ./volumes/hypothesis-logs/stand-F/agents:/app/logs:rw
      - ./volumes/hypothesis-logs/stand-F/dotnet:/app/dotnet-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./history_cases:/app/history_cases:rw
    networks:
      - hyp-network
    ports:
      - "8050:8000"

  dotnet-app-f:
    build:
      context: ./dotnet-app
      dockerfile: Dockerfile
    container_name: hyp-f-dotnet-app
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      BUILD_ON_START: "true"
      Logging__LogLevel__Default: Debug
      Logging__LogLevel__Microsoft: Information
      Logging__LogLevel__System: Information
    volumes:
      - ./test-stands/src-F:/app/code:rw
      - ./dotnet-app/local-nuget-packages:/root/.nuget/packages:ro
      - ./volumes/hypothesis-logs/stand-F/dotnet:/app/logs:rw
    networks:
      - hyp-network
    ports:
      - "5006:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/api/appconfig || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 20
      start_period: 120s

networks:
  hyp-network:
    external: true
    name: hyp-network
